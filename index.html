<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sweet Lollipop ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
overflow:hidden;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

#hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.heart{
position:absolute;
color:#ff4d88;
animation:float 8s linear infinite;
opacity:.8;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.4);
opacity:0;
}

}

.card{

width:92%;
max-width:760px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:30px;

padding:35px;

text-align:center;

box-shadow:0 0 40px rgba(255,105,180,.25);

}

.title{

font-size:40px;

font-weight:700;

margin-bottom:20px;

color:#ff7eb3;

animation:beat 1.2s infinite;

}

@keyframes beat{

50%{
transform:scale(1.06);
}

}

.openHeart{

width:180px;

height:170px;

background:#ff2d75;

margin:auto;

cursor:pointer;

clip-path:path("M90 160 L20 90 A40 40 0 1 1 90 45 A40 40 0 1 1 160 90 Z");

display:flex;

justify-content:center;

align-items:center;

font-weight:bold;

font-size:19px;

transition:.4s;

}

.openHeart:hover{

transform:scale(1.08);

}

#content{

display:none;

animation:fade 2s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.gallery{

display:flex;

justify-content:center;

gap:20px;

margin:25px 0;

flex-wrap:wrap;

}

.gallery img{

width:170px;

height:220px;

object-fit:cover;

border-radius:20px;

border:4px solid rgba(255,255,255,.2);

box-shadow:0 0 25px rgba(255,105,180,.4);

transition:.4s;

}

.gallery img:hover{

transform:scale(1.05);

}

#letter{

font-size:19px;

line-height:1.9;

margin-top:20px;

white-space:pre-wrap;

text-align:left;

}

footer{

margin-top:35px;

font-size:22px;

color:#ffd6e8;

}

.music{

position:fixed;

top:20px;

right:20px;

background:#ff2d75;

padding:10px 20px;

border-radius:40px;

cursor:pointer;

}

</style>

</head>

<body>

<canvas id="sky"></canvas>

<div id="hearts"></div>

<div class="music" onclick="toggleMusic()">
🎵 Music
</div>

<div class="card">

<div id="start">

<h1 class="title">
For My Sweet Lollipop 🍭
</h1>

<div class="openHeart"
onclick="openHeart()">

Open<br>My<br>Heart

</div>

</div>

<div id="content">

<h1 class="title">

I Love You Maria ❤️

</h1>

<div class="gallery">

<img src="photo1.jpg">

<img src="photo2.jpg">

</div>

<p id="letter"></p>

<footer>

Forever Yours ❤️<br>

<b>Sujon</b>

</footer>

</div>

</div>

<audio id="bgmusic" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>

<script>

const text=`Dear My Sweet Lollipop 🍭,

হয়তো আমি কথায় খুব ভালোবাসা প্রকাশ করতে পারি না।
কিন্তু বিশ্বাস করো, আমার প্রতিটি অনুভূতির কেন্দ্রবিন্দু তুমি।

তোমার হাসি আমার দিনের সবচেয়ে সুন্দর মুহূর্ত।
তোমার অভিমান আমার সবচেয়ে বড় ভয়।
আর তোমার একটি "ভালো আছি" আমার সবচেয়ে বড় শান্তি।

আমি জানি না ভবিষ্যৎ আমাদের কোথায় নিয়ে যাবে।
কিন্তু আমি শুধু এটুকু জানি—

যতদিন আমার হৃদয় স্পন্দিত হবে,
ততদিন তার প্রতিটি স্পন্দনে থাকবে শুধু তোমার নাম।

তুমি আমার জীবনের সবচেয়ে সুন্দর অধ্যায়।
তুমি আমার সবচেয়ে প্রিয় মানুষ।
আর তুমি থাকবে আমার হৃদয়ের সবচেয়ে সুন্দর জায়গায়।

I Love You So Much, My Sweet Lollipop ❤️

Forever Yours,
Sujon ❤️`;

let i=0;

function openHeart(){

document.getElementById("start").style.display="none";

document.getElementById("content").style.display="block";

document.getElementById("bgmusic").play();

typing();

}

function typing(){

if(i<text.length){

document.getElementById("letter").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,35);

}

}

function toggleMusic(){

let music=document.getElementById("bgmusic");

if(music.paused){

music.play();

}else{

music.pause();

}

}

for(let x=0;x<35;x++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*30)+"px";

h.style.animationDuration=(5+Math.random()*5)+"s";

document.getElementById("hearts").appendChild(h);

  }const canvas=document.getElementById("sky");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let stars=[];

for(let s=0;s<180;s++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2,

a:Math.random()

});

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#050816";

ctx.fillRect(0,0,canvas.width,canvas.height);

for(let star of stars){

ctx.beginPath();

ctx.arc(star.x,star.y,star.r,0,Math.PI*2);

ctx.fillStyle="rgba(255,255,255,"+star.a+")";

ctx.fill();

star.a+=Math.random()*0.02-0.01;

if(star.a<0.2) star.a=0.2;

if(star.a>1) star.a=1;

}

requestAnimationFrame(drawStars);

}

drawStars();

window.onresize=function(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

setInterval(()=>{

for(let i=0;i<12;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(18+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},9000);

}

},2000);

</script>

</body>

</html>
